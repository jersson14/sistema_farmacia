<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>PERNO CENTRO | Login</title>
  <meta content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" name="viewport">
  <link rel="stylesheet" href="../public/css/bootstrap.min.css">
  <link rel="icon" id="loginFavicon" href="logo1.jpeg" type="image/jpg">
  <link rel="stylesheet" href="../public/css/font-awesome.min.css">
  <link rel="stylesheet" href="../public/css/AdminLTE.min.css">
  <link rel="stylesheet" href="../public/css/_all-skins.min.css">
  <link rel="stylesheet" href="../public/css/custom-theme.css?v=20260420h">
</head>
<body class="hold-transition login-page">

<div class="login-shell">
  <section class="login-brand">
    <img src="logo1.jpeg" alt="Logo Perno Centro" class="login-brand-logo" id="loginBrandLogo" onerror="this.src='logo1.jpeg'">
    <p>Sistema profesional para gestionar inventario, compras y ventas con control operativo en tiempo real.</p>
    <ul class="brand-bullets">
      <li><i class="fa fa-check-circle"></i> Control de stock y unidades de medida</li>
      <li><i class="fa fa-check-circle"></i> Boletas y reportes listos para clientes</li>
      <li><i class="fa fa-check-circle"></i> Flujo rápido para ventas y almacén</li>
    </ul>
  </section>

  <section class="login-form-panel">
    <div class="login-form-card">
      <h2 class="login-form-title">Iniciar Sesión</h2>
      <p class="login-form-subtitle">Accede al panel administrativo de tu tienda</p>

      <form method="post" id="frmAcceso">
        <div class="form-group has-feedback">
          <input type="text" id="logina" name="logina" class="form-control" placeholder="Usuario" required autocomplete="username">
          <span class="fa fa-user form-control-feedback"></span>
        </div>
        <div class="form-group has-feedback">
          <input type="password" id="clavea" name="clavea" class="form-control login-password-input" placeholder="Contraseña" required autocomplete="current-password">
          <button type="button" id="toggleClave" class="password-toggle-btn" aria-label="Mostrar contraseña" title="Mostrar contraseña">
            <i class="fa fa-eye"></i>
          </button>
        </div>
        <div class="row login-options-row">
          <div class="col-xs-12">
            <label class="login-remember">
              <input type="checkbox" id="rememberLogin">
              <span>Recuérdame</span>
            </label>
          </div>
        </div>
        <div class="row">
          <div class="col-xs-12">
            <button type="submit" class="btn btn-primary btn-block login-submit">Entrar al Sistema</button>
          </div>
        </div>
      </form>
    </div>
  </section>
</div>

<script src="../public/js/jquery.min.js"></script>
<script src="../public/js/bootstrap.min.js"></script>
<script src="../public/js/bootbox.min.js"></script>
<script src="scripts/login.js?v=20260321i"></script>

</body>
</html>
